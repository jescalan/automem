# docker-compose.yml - Local development environment

services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "127.0.0.1:6379:6379" # Redis/FalkorDB (localhost only)
      - "127.0.0.1:3000:3000" # Browser UI (localhost only)
    volumes:
      - falkordb_data:/var/lib/falkordb/data # Persistent data (actual data location, /data is symlink)
      - ./backups/falkordb:/backups # Local backups
    environment:
      # Aggressive persistence: save every 60s if 1 key changed, enable AOF
      - REDIS_ARGS=--save 60 1 --appendonly yes --appendfsync everysec --dir /var/lib/falkordb/data
      - REDIS_PASSWORD=${FALKORDB_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "127.0.0.1:6333:6333" # localhost only
    volumes:
      - qdrant_data:/qdrant/storage
      - ./backups/qdrant:/backups
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  flask-api:
    build: .
    ports:
      - "127.0.0.1:8001:8001" # Flask API (localhost)
      - "100.105.185.42:8001:8001" # Flask API (Tailscale only)
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      PORT: 8001
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      FALKORDB_PASSWORD: ${FALKORDB_PASSWORD:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      AUTOMEM_API_TOKEN: ${AUTOMEM_API_TOKEN:-test-token}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-test-admin-token}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-}
      RERANK_MODEL: ${RERANK_MODEL:-gpt-4.1-nano}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-auto}  # auto|openai|local|placeholder
      AUTOMEM_MODELS_DIR: /root/.config/automem/models  # Keep in sync with volume mount
      MEMORY_CONTENT_SOFT_LIMIT: "1000"   # Trigger summarization above this
      MEMORY_CONTENT_HARD_LIMIT: "4000"   # Reject above this (was 2000)
      MEMORY_AUTO_SUMMARIZE: "false"      # Enable to auto-summarize long content
      MEMORY_DEDUP_ENABLED: ${MEMORY_DEDUP_ENABLED:-false}
      MEMORY_DEDUP_MODEL: ${MEMORY_DEDUP_MODEL:-gpt-4o-mini}
      MEMORY_DEDUP_SIMILARITY_THRESHOLD: ${MEMORY_DEDUP_SIMILARITY_THRESHOLD:-0.70}
    depends_on:
      falkordb:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - fastembed_models:/root/.config/automem/models  # Persist embedding models
    restart: unless-stopped

  # Optional: FalkorDB Browser for visualization
  falkordb-browser:
    image: falkordb/falkordb-browser:latest
    ports:
      - "127.0.0.1:3001:3000" # Browser UI (localhost only)
    environment:
      - FALKORDB_URL=redis://${FALKORDB_PASSWORD:+:${FALKORDB_PASSWORD}@}falkordb:6379
    depends_on:
      - falkordb
    restart: unless-stopped
    profiles: ["browser"] # Only start with: docker-compose --profile browser up

volumes:
  falkordb_data:
  qdrant_data:
  fastembed_models:  # Persistent cache for local embedding models
